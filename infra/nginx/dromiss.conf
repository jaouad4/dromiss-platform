# Symlink to /etc/nginx/sites-enabled/ to activate:
#   ln -s /etc/nginx/sites-available/dromiss /etc/nginx/sites-enabled/
# Certbot will automatically add the SSL server block when you run:
#   certbot --nginx -d dromiss.com -d www.dromiss.com

server {
    listen 80;
    server_name dromiss.com www.dromiss.com;

    root /var/www/dromiss;
    index index.html;

    # Security headers (reinforcing what's in HTML meta tags)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — 30-day cache
    location ~* \.(css|js|png|jpg|jpeg|ico|svg|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # FastAPI proxy — /api/ routes
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        proxy_connect_timeout 5s;
        # Only allow POST requests to /api/ (GET /api/health is excluded below)
        limit_except POST { deny all; }
    }

    # Allow GET on health endpoint
    location = /api/health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static site fallback
    location / {
        try_files $uri $uri/ =404;
    }
}
