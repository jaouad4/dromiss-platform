# Symlink to /etc/nginx/sites-enabled/ to activate:
#   ln -s /etc/nginx/sites-available/odoo /etc/nginx/sites-enabled/
# Certbot will automatically add the SSL server block when you run:
#   certbot --nginx -d odoo.dromiss.com

server {
    listen 80;
    server_name odoo.dromiss.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Required for Odoo's longpolling
        proxy_buffering off;
    }

    # Odoo longpolling port
    location /longpolling {
        proxy_pass http://127.0.0.1:8072;
    }
}
