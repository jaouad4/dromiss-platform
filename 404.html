<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page introuvable - Dromiss</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="./assets/img/dromiss-small-logo.png">

    <!-- Fonts -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/tokens.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />

    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: var(--space-8);
        gap: var(--space-6);
      }

      .error-page__code {
        font-family: var(--font-display);
        font-size: clamp(5rem, 20vw, 10rem);
        font-weight: 800;
        line-height: 1;
        color: var(--color-primary);
        opacity: 0.15;
      }

      .error-page__title {
        font-size: var(--text-xl);
        color: var(--color-text);
      }

      .error-page__subtitle {
        font-size: var(--text-base);
        color: var(--color-text-muted);
        max-width: 40ch;
      }

      .error-page__actions {
        display: flex;
        gap: var(--space-4);
        flex-wrap: wrap;
        justify-content: center;
        margin-top: var(--space-4);
      }
    </style>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main id="main">
      <div class="error-page">
        <div class="error-page__code" aria-hidden="true">404</div>
        <h1 class="error-page__title">Page introuvable</h1>
        <p class="error-page__subtitle">
          La page que vous cherchez n'existe pas ou a été déplacée.
        </p>
        <div class="error-page__actions">
          <a href="/" class="btn-primary">Retour à l'accueil</a>
          <a href="/contact.html" class="btn-secondary">Nous contacter</a>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="./assets/js/ui.js"></script>
  </body>
</html>
